# Конфигурация автонавигации. Все секции необязательны — отсутствующие берут
# значения по умолчанию из genshin_nav/config.py.

control:
  move_key: w
  jump_key: space
  sprint_key: shift
  stuck_window_s: 3.0
  stuck_min_displacement_m: 0.3
  waypoint_tolerance_m: 2.0
  corridor_half_width_m: 1.2
  corridor_length_m: 6.0
  input_backend: pydirectinput
  dry_run: false
  dead_reckon_speed: 5.5
  position_source: dead_reckon    # dead_reckon (плавно, не замерзает) | odometry (точнее по фрейму, но на зуме 4.166 глючит/замерзает)
  sprint: false                    # бежать с зажатым Shift (быстрее; тратит стамину)
  sprint_max_err_deg: 30.0        # спринт ТОЛЬКО при |ошибке курса|<этого; на поворотах идём шагом (меньше занос)
  heading_trim_deg: 0.0           # компенсация стабильного увода: вправо уходит → +2..+4; влево → отрицательное
  teleport_dismiss_xy: [955, 1016] # ЭКРАН: куда ЛКМ, чтобы закрыть F-меню после активации. КАЛИБРОВАТЬ: scripts/calibrate_click.py
  teleport_dismiss_wait_s: 0.5    # пауза после закрытия F-меню, до нажатия M
  teleport_wait_menu_s: 4.5       # ждать появления F-меню после нажатия F
  teleport_after_s: 3.5
  teleport_tolerance_m: 2.0
  teleport_detect_template: true   # жать F по реально видимой подсказке «F Точка телепортации» (надёжнее дрейфа)
  teleport_template_path: Fteleport.png
  teleport_template_threshold: 0.7
  teleport_detect_radius_m: 8.0    # с какого расстояния до точки начинать искать подсказку
  turn_deadzone_deg: 7.0
  turn_gain: 1
  turn_throttle_s: 0.22
  turn_max_units: 120
  lookahead_m: 8.0
  align_tolerance_deg: 12.0

capture:
  region: null            # [left, top, width, height] окна игры; null = автопоиск по заголовку
  window_title: "Genshin Impact"
  backend: dxcam          # dxcam (быстро, Windows) | mss (фолбэк)
  target_fps: 60

minimap:
  region: [52, 22, 200, 200]      # регион миникарты под 1920x1080; откалибровать!
  world_atlas_path: null          # путь к сшитому атласу мира (north-up) для глоб. локализации
  atlas_meters_per_px: 1.0
  minimap_meters_per_px: 4.166
  move_min_shift_m: 0.05          # ниже этого сдвига карты курс из движения не считаем (стоим)
  move_sign: -1                   # знак движения vs сдвиг карты (сверено с конусом камеры: -1)
  heading_source: arrow           # arrow (продакшн) | tracker (MinimapTracker). Сравнить: scripts/compare_heading.py
  tracker_heading_offset_deg: 0.0 # поправка конвенции трекера (значение печатает compare_heading.py)
  use_cone_fallback: false        # ТЕСТ: выкл конус (уводит курс вбок); стоя держим послед. курс по карте
  heading_sample_dt: 0.15         # сравниваем кадры с этим интервалом (с), а не каждый кадр
  heading_min_response: 0.15      # отбрасывать сэмплы phaseCorrelate ниже этого качества (шум)
  heading_move_floor_px: 0.15     # сдвиг карты за сэмпл, ниже которого считаем что стоим
  heading_smooth_alpha: 0.4       # сглаживание курса (круговое EMA): больше = резче реакция
  motion_ring_inner_frac: 0.25    # кольцевая маска: убрать центральный маркер игрока
  motion_ring_outer_frac: 0.48    # и углы квадрата (3D-сцена за кругом миникарты)
  arrow_hsv_low:  [88, 88, 141]   # живая калибровка: hue 85-101 узкий (cyan, без травы), S/V подобраны
  arrow_hsv_high: [96, 255, 255]
  arrow_roi_frac: 0.22            # зона поиска стрелки (стрелка вылезает за узкие 0.10)

camera:
  fov_horizontal_deg: 45.0
  image_width: 1920
  image_height: 1080
  orbit_radius_m: 4.5             # радиус орбиты камеры 3-го лица вокруг персонажа
  deg_per_mouse_unit: 0.12  # градусов поворота камеры на 1 ед. мыши. Было 12 (×100, опечатка):
                            # руль слал dx≈3ед на ошибку 45° → не поворачивал. КАЛИБРОВАТЬ:
                            # scripts/calibrate_mouse.py (если крутит мало — уменьшить, если перелетает — увеличить)
  yaw_sign: -1     # было +1, у тебя инверсия — поставь -1

sam:
  enabled: true
  model_id: "facebook/sam3"       # для openvino — путь к .xml IR-модели
  backend: torch                  # torch | openvino (openvino -> увести с дискретки)
  device: cuda                    # torch: cuda|cpu ; openvino: GPU.0(iGPU)|GPU.1(dGPU)|CPU|NPU
  max_interval_frames: 120        # верхний предел форс-ресинка
  input_downscale: 0.5
  points_per_side: 16
  roi_only: true                  # сегментировать только ROI вокруг ожидаемого объекта
  roi_pad_px: 24
  use_tracker: false              # Sam3Tracker между кейфреймами (лучше через openvino/CPU)

keyframe:
  on_camera_wobble: true          # триггер: покачивание камеры (шаг триангуляции)
  on_low_confidence: true         # триггер: дрейф optical-flow / потеря точек
  min_good_features: 40
  max_flow_residual_px: 6.0
  min_frames_between: 8

semantic:
  enabled: false                  # включить для смысловой разметки (монстры/деревья)
  model_name: segformer
  weights_path: null
  device: cuda
  monster_labels: ["person", "animal"]
  obstacle_labels: ["tree", "rock", "building", "wall", "fence"]

fusion:
  minimap_pos_var: 4.0            # доверие к миникарте (больше = грубее)
  flow_vel_var: 0.25             # доверие к скорости от optical-flow (меньше = точнее)
  process_var: 0.5
